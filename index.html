<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conta in me nt</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <h1 class="title"> conta  in  me  nt </h1>
        <div class="puzzle-date" id="puzzleDate"></div>

        <p class="subtitle">
            find words that contain the following three letters consecutively! search for the shortest and longest words
        </p>

        <div class="letters-display" id="lettersDisplay"></div>

        <div id="progressContainer" class="progress-container" style="display:none;">
            <div class="progress-bar">
                <div class="progress-fill-clip">
                    <div id="progressFill" class="progress-fill">
                        <span id="progressCurrent" class="progress-count-inner">0</span>
                    </div>
                </div>
                <div id="hintMarkers" class="hint-markers"></div>
                <span id="progressTotal" class="progress-count-end">0</span>
            </div>
        </div>

        <form id="wordForm">
            <input
                type="text"
                id="wordInput"
                class="word-input"
                placeholder="enter word..."
                autocomplete="off"
            >
            <button type="submit" class="submit-btn">submit</button>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="results">
            <div id="wordList"></div>
            <button id="debugBtn" class="debug-btn" style="display:none;">Debug</button>
            <button id="shareBtn" class="share-btn" style="display: none;">share</button>
            <div class="share-message" id="shareMessage"></div>
        </div>

        <p> thanks raina, dillon, blake, jay, arpit!! also https://github.com/dwyl/english-words </p>
    </div>

    <div id="calendarOverlay" class="calendar-overlay">
        <div class="calendar-modal">
            <div class="calendar-header">
                <button class="calendar-nav" id="calendarPrev">&larr;</button>
                <span class="calendar-month-year" id="calendarMonthYear"></span>
                <button class="calendar-nav" id="calendarNext">&rarr;</button>
            </div>
            <div class="calendar-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>
    </div>

    <div class="definition-tooltip" id="definitionTooltip"></div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
    <script src="letterSets.js"></script>
    <script src="script.js"></script>
</body>
</html>
